<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .checkout-container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .theme-toggle {
            position: static;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
        }

        .card {
            padding: 24px;
            border-radius: 16px;
            background: var(--card-glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--subtext);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--card-glass);
            color: var(--text);
        }

        input:focus {
            border-color: #2563eb;
        }

        .payment-tabs {
            display: flex;
            gap: 10px;
            margin: 12px 0;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            text-align: center;
            cursor: pointer;
        }

        .tab.active {
            background: #2563eb;
            color: white;
        }

        .payment-content {
            display: none;
        }

        .payment-content.active {
            display: block;
        }

        .car-summary img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }

        .total {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .pay-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: white;
            font-weight: 500;
            margin-top: 20px;
            cursor: pointer;
        }

        .success-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .success-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .success-box {
            background: var(--card-glass);
            border: 1px solid var(--glass-border);
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            backdrop-filter: blur(12px);
            animation: pop 0.4s ease;
        }

        .success-box button {
            margin-top: 15px;
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        @keyframes pop {
            from {
                transform: scale(0.7);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media(max-width:768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="checkout-container">

        <div class="top-bar">
            <button class="btn" onclick="history.back()">← Back</button>

            <button id="themeToggle" class="theme-toggle">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>

        <h1>Checkout</h1>

        <div class="checkout-grid">

            <div class="card">

                <h3>Billing Details</h3>

                <div class="form-group">
                    <label>Full Name</label>
                    <input id="name" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input id="email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input id="address" placeholder="Enter your address">
                </div>

                <h3>Payment</h3>

                <div class="payment-tabs">
                    <div class="tab active" onclick="switchTab('card', this)">Card</div>
                    <div class="tab" onclick="switchTab('upi', this)">UPI</div>
                </div>

                <div id="card" class="payment-content active">
                    <div class="form-group">
                        <label>Card Number</label>
                        <input placeholder="1234 5678 9012 3456">
                    </div>

                    <div class="form-group">
                        <label>Expiry</label>
                        <input placeholder="MM/YY">
                    </div>

                    <div class="form-group">
                        <label>CVV</label>
                        <input placeholder="***">
                    </div>
                </div>

                <div id="upi" class="payment-content">
                    <div class="form-group">
                        <label>UPI ID</label>
                        <input placeholder="example@upi">
                    </div>
                </div>

            </div>

            <div class="card car-summary">

                <div id="summary"></div>

                <hr>

                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal"></span>
                </div>

                <div class="summary-row">
                    <span>Tax</span>
                    <span id="tax"></span>
                </div>

                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total"></span>
                </div>

                <button class="pay-btn" onclick="placeOrder()">Place Order</button>

            </div>

        </div>

    </div>

    <div class="success-modal" id="successModal">
        <div class="success-box">
            <h2>🎉 Order Successful!</h2>
            <p>Your car is on the way 🚗</p>
            <button onclick="goHome()">Go Home</button>
        </div>
    </div>
    <div id="formError" style="color:#ef4444; margin-top:10px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>

        const car = JSON.parse(localStorage.getItem("checkoutCar"));

        document.getElementById("summary").innerHTML = `
<img src="${car.image}">
<h2>${car.name}</h2>
<p>${car.price}</p>
`;

        const price = parseFloat(car.price.replace(/[^\d.]/g, ""));
        const tax = price * 0.18;
        const total = price + tax;

        subtotal.innerText = price;
        taxEl = document.getElementById("tax");
        totalEl = document.getElementById("total");

        taxEl.innerText = tax.toFixed(2);
        totalEl.innerText = total.toFixed(2);

        function switchTab(type, el) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".payment-content").forEach(c => c.classList.remove("active"));

            el.classList.add("active");
            document.getElementById(type).classList.add("active");
        }

        function placeOrder() {
            const nameInput = document.getElementById("name");
            const emailInput = document.getElementById("email");
            const addressInput = document.getElementById("address");

            if (!nameInput.value.trim() || !emailInput.value.trim() || !addressInput.value.trim()) {
                showError("Please fill all fields");
                return;
            }

            document.getElementById("successModal").classList.add("active");

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                }, i * 300);
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }

        const toggleBtn = document.getElementById("themeToggle");

        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }

        toggleBtn.onclick = () => {
            document.body.classList.toggle("dark");
            localStorage.setItem("theme",
                document.body.classList.contains("dark") ? "dark" : "light"
            );
        }

        function showError(msg) {
            document.getElementById("formError").innerText = msg;
        }

    </script>

</body>

</html>
